/<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WebXR A-Frame GLB Example</title>
  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
  <!-- A-Frame 씬 시작 -->
  <a-scene>

    <!-- ========================= -->
    <!-- 카메라 + 컨트롤 설정 -->
    <!-- ========================= -->
    <a-entity id="player" position="0 1.6 3">
      
      <!-- 카메라 -->
      <a-camera wasd-controls="acceleration: 50" look-controls="pointerLockEnabled: true">
        
        <!-- VR 컨트롤러 (왼손 / 오른손) -->
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>

      </a-camera>
    </a-entity>

    <!-- ========================= -->
    <!-- 하늘 (배경) -->
    <!-- ========================= -->
    <a-sky color="#88ccee"></a-sky>

    <!-- ========================= -->
    <!-- 바닥 -->
    <!-- ========================= -->
    <a-plane 
      rotation="-90 0 0" 
      width="50" 
      height="50" 
      color="#7BC8A4">
    </a-plane>

    <!-- ========================= -->
    <!-- 조명 설정 -->
    <!-- ========================= -->

    <!-- 전체를 밝히는 환경광 -->
    <a-light type="ambient" intensity="0.6"></a-light>

    <!-- 방향성 조명 (태양 느낌) -->
    <a-light 
      type="directional" 
      position="5 10 7" 
      intensity="0.8">
    </a-light>

    <!-- ========================= -->
    <!-- GLB 3D 모델 -->
    <!-- ========================= -->
    <a-entity
      gltf-model="model.glb"   <!-- GLB 파일 불러오기 -->
      position="0 0 -3"        <!-- 앞쪽 중앙 위치 -->
      scale="2 2 2"            <!-- 적당히 크게 -->
      rotation="0 30 0">       <!-- 약간 회전 -->
    </a-entity>

  </a-scene>
</body>
</html>
/
